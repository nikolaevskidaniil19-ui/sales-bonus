name: Tests

on:
  push:
    branches:
      - "**"
    tags:
      - "**"

env:
  # 1. Добавляем флаг принудительного перехода на Node.js 24 для экшенов
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DIR_TESTS: /tmp/tests-sales-bonus
  REP_TESTS: https://github.com/Yandex-Practicum/tests-sales-bonus.git
  REPO: ${{ github.event.repository.name }}

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Set up GitHub Actions
        uses: actions/checkout@v4

      - name: Use Node.js 24.x # 2. Обновил с 18.x на 24.x для соответствия новым стандартам
        uses: actions/setup-node@v4
        with:
          node-version: 24.x

      - name: Get testing lib
        run: set -eu && git clone --depth 1 $REP_TESTS $DIR_TESTS

      - name: Run tests
        run: bash $DIR_TESTS/bin/run.sh

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: output
          path: /tmp/tests-sales-bonus/output
          retention-days: 30
